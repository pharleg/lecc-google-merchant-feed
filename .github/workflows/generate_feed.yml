name: Generate Google Merchant Center Feed

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  generate-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Generate Google Merchant Center feed
        env:
          WIX_API_KEY:    ${{ secrets.WIX_API_KEY }}
          WIX_SITE_ID:    ${{ secrets.WIX_SITE_ID }}
          WIX_ACCOUNT_ID: ${{ secrets.WIX_ACCOUNT_ID }}
        run: python generate_feed.py

      - name: Debug - list files
        run: |
          echo "Current directory: $(pwd)"
          echo "Files in current dir:"
          ls -la
          echo "TSV files anywhere:"
          find . -name "*.tsv" 2>/dev/null

      - name: Commit and push feed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f google_feed.tsv
          git diff --cached --quiet || git commit -m "chore: update Google Merchant Center feed [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
